<!DOCTYPE html>
<!-- Indica que es HTML5. Siempre primera línea. -->
 
<html lang='es'>
<!-- Elemento raíz. lang='es' ayuda a lectores de pantalla y buscadores. -->
 
  <head>
  <!-- Metadatos: el navegador los necesita pero no los muestra al usuario -->
 
    <meta charset='UTF-8'>
    <!-- Codificación de caracteres: soporta tildes, ñ, emojis -->
 
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <!-- Sin esto, en celular la página se ve muy pequeña -->
 
    <title>TechStore - Tu tienda de tecnología</title>
    <!-- Aparece en la pestaña del navegador y en Google -->
 
    <link rel='stylesheet' href='estilos.css'>
    <!-- Vincula el archivo CSS. El path es relativo al index.html -->
    <!-- estilos.css debe estar en la misma carpeta que index.html -->
  </head>
 
  <body>
    <header> 
      <h1> ⚡ TECHSTORE</h1>
      <nav>
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="#productos">Productos</a></li>
          <li><a href="#contacto">Contacto</a></li>
          <li><a href="registro.html">Login</a></li>
          <li><a href="nuevoproducto.html">Nuevo Producto</a></li>
          <button class="btn-carrito" id="btn-carrito">🛒<span class="contador-carrito" id="contador-carrito">0</span></button>
        </ul>
      </nav>
    </header>

  <main>
    <section>
      <h2>Agregar nuevo producto</h2>

      <form id="form-nuevo-producto">
        <div class="campo">
          <label for="nombre">Nombre del producto *</label>
          <input type="text" id="nombre" name="nombre"
                 placeholder="Ej: Smartphone XYZ" required>
        </div>

        <div class="campo">
          <label for="precio">Precio *</label>
          <input type="number" id="precio" name="precio"
                 placeholder="Ej: 199.99" step="0.01" required>
        </div>

        <div class="campo">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" name="descripcion"
                    placeholder="Descripción del producto"></textarea>
        </div>

        <button type="submit">Agregar producto</button>

      </form>

    </section>
  
  </main>
  <!-- Todo lo visible va acá -->
    <script src='js/app.js'></script>

    
  </body>
 
  <footer>
    <h6>Fabián M. Corti - 2026</h6>
  </footer>
</html>
